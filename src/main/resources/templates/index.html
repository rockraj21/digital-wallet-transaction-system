<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Digital Wallet</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* container */

.container{
width:1100px;
margin:60px auto;
padding:40px;
border-radius:18px;
background:#111827;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* title */

h1{
text-align:center;
margin-bottom:40px;
font-size:34px;
letter-spacing:1px;
color:#60a5fa;
}

/* form */

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:40px;
}

input,select{
padding:14px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
font-size:14px;
transition:0.2s;
}

input:focus,select:focus{
border-color:#60a5fa;
outline:none;
}

/* button */

button{
grid-column:1 / span 2;
padding:15px;
border-radius:10px;
border:none;
font-size:15px;
background:#3b82f6;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2563eb;
transform:translateY(-1px);
}

/* table */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
text-align:left;
padding:14px;
background:#1e293b;
font-weight:500;
font-size:14px;
}

td{
padding:14px;
border-bottom:1px solid #1e293b;
}

tr:hover{
background:#0f172a;
}

/* credit debit */

.credit{
color:#22c55e;
font-weight:600;
}

.debit{
color:#ef4444;
font-weight:600;
}

/* balance */

.balance{
font-weight:600;
color:#60a5fa;
}

/* error */

.error{
color:#ef4444;
text-align:center;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Digital Wallet Transaction System</h1>

<p class="error" th:text="${error}"></p>

<form th:action="@{/save}" method="post">

<input type="text" name="userName" placeholder="User Name" required>

<input type="text" name="walletId" placeholder="Wallet ID" required>

<select name="transactionType">
<option value="Credit">Credit</option>
<option value="Debit">Debit</option>
</select>

<input type="number" name="amount" placeholder="Amount" required>

<input type="text" name="description" placeholder="Description">

<button type="submit">Add Transaction</button>

</form>

<table>

<tr>
<th>ID</th>
<th>User</th>
<th>Wallet</th>
<th>Type</th>
<th>Amount</th>
<th>Balance</th>
<th>Description</th>
<th>Time</th>
</tr>

<tr th:each="t : ${transactions}">

<td th:text="${t.id}"></td>

<td th:text="${t.userName}"></td>

<td th:text="${t.walletId}"></td>

<td th:text="${t.transactionType}"
th:class="${t.transactionType == 'Credit'} ? 'credit' : 'debit'"></td>

<td th:text="${t.amount}"></td>

<td class="balance" th:text="${t.balance}"></td>

<td th:text="${t.description}"></td>

<td th:text="${#temporals.format(t.transactionTime,'dd-MM-yyyy HH:mm')}"></td>

</tr>

</table>

</div>

</body>

</html>
